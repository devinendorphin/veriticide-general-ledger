# Veriticide Master Ledger — Source Configuration
# Edit this file to add/remove sources. Run scraper.py to collect.

settings:
  ledger_file: ../ledger/ledger.md
  seen_file: ../ledger/.seen_hashes.txt
  capture_method_web: "Web scrape"
  capture_method_twitter: "Twitter public scrape"

  # Optional: set ANTHROPIC_API_KEY env var to enable auto-formatting.
  # Without it, raw captures are stored and flagged for manual formatting.
  auto_format: true

twitter:
  # Accounts to monitor. Add handles without @.
  accounts:
    # AI labs — executives and researchers (Cluster 2, Cluster 7)
    - sama                # Sam Altman, OpenAI
    - darioamodei         # Dario Amodei, Anthropic CEO
    - elonmusk            # Elon Musk, xAI / X Corp (Cluster 3, Cluster 4)
    - mustafasuleyman     # Mustafa Suleyman, Microsoft AI
    - ylecun              # Yann LeCun, Meta AI

    # EA / longtermism / AI safety funding infrastructure (Cluster 6)
    - ESYudkowsky         # Eliezer Yudkowsky, MIRI
    - willmacaskill       # Will MacAskill, EA / 80,000 Hours
    - HoldenKarnofsky     # Holden Karnofsky, Open Philanthropy

    # Cluster 3 — AI/tech culture accounts with documented entries
    - yacineMTB           # Cluster 3 — pattern closure PARTIAL; temporal persistence target
    - xlr8harder          # Cluster 3 — SINCERE-UNBOUNDED entry logged
    - repligate           # Cluster 3 — SINCERE-UNBOUNDED entry logged
    - roon                # Cluster 3 — NULL/Track C entry logged
    - amandaaskell        # Cluster 3 — CONTROL entry logged

    # Christian nationalism / TPUSA (Cluster 5)
    - charliekirk11       # Charlie Kirk, Turning Point USA
    - TPUSA               # Turning Point USA institutional account

    # DOGE / federal dismantlement (Cluster 4)
    - DOGE                # Official DOGE account

  # Keywords that trigger capture when found in a tweet from any account above.
  # Leave empty to capture everything from the listed accounts.
  keywords:
    # --- AI governance / safety-washing vocabulary (Cluster 7) ---
    - "existential risk"
    - "existential safety"
    - "long-term future"
    - "humanity's future"
    - "transformative AI"
    - AGI
    - superintelligence
    - alignment
    - "beneficial AI"
    - "responsible AI"
    - "AI safety"
    - "effective altruism"
    - "expected value"
    - longtermism
    - x-risk
    - civilizational
    - "future generations"
    - "acceptable risk"
    - "acceptable cost"
    - tradeoff
    - sacrific

    # --- EA / doing-the-most-good vocabulary (Cluster 6) ---
    - "doing the most good"
    - "most good"
    - "evidence-based giving"
    - "earning to give"
    - "cause prioritization"
    - "neartermist"
    - "longtermist"
    - "trillion people"
    - "billion people"
    - "moral circle"
    - "population ethics"

    # --- DOGE / taxpayer-protection vocabulary (Cluster 4) ---
    - DOGE
    - "government efficiency"
    - "waste fraud abuse"
    - "wasteful spending"
    - "taxpayer money"
    - "taxpayer dollars"
    - "deep state"
    - "administrative state"
    - "federal workforce"
    - "reduction in force"
    - defund
    - USAID
    - PEPFAR
    - CFPB
    - SAMHSA

    # --- Christian nationalism / protecting-children vocabulary (Cluster 5) ---
    - "parental rights"
    - "parents rights"
    - "protecting children"
    - "protect children"
    - "gender ideology"
    - "gender affirming"
    - grooming
    - indoctrination
    - "school choice"
    - "parental consent"

    # --- Cross-cluster care-vocabulary signals (Pattern Registry Entry 3) ---
    - "for the children"
    - "for taxpayers"
    - "for humanity"
    - "for all of us"
    - "suicidal empathy"
    - "civilizational suicide"

  max_tweets_per_account: 10

